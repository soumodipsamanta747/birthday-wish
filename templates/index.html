<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Magical Journey for Aditi</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* --- CINEMATIC WORLD STYLES --- */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Georgia', serif;
            background-color: #5bb4ff; 
            touch-action: none; /* Crucial for our zoom mechanic */
            transition: background-color 2.5s ease-in-out;
        }

        /* The 3D Parallax Container */
        #world {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; perspective: 1000px;
        }

        /* Layer 1: Sky (Moves Slowest) */
        #layer-sky {
            position: absolute; top: 0; width: 100%; height: 60%;
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            transition: transform 0.4s ease-out;
        }

        /* Layer 2: The Blossom Tree & Back Field (Moves Medium) */
        #layer-mid {
            position: absolute; bottom: 0; width: 100%; height: 50%;
            transition: transform 0.4s ease-out; transform-origin: center bottom;
        }
        .grass-bg { position: absolute; bottom: 0; width: 100%; height: 100%; background: linear-gradient(to top, #2e7d32, #66bb6a); border-radius: 50% 50% 0 0 / 20px 20px 0 0; }
        
        #blossom-tree {
            position: absolute; bottom: 40%; left: 50%; transform: translateX(-50%);
            width: 180px; height: 250px; z-index: 2;
        }
        .trunk { position: absolute; bottom: 0; left: 45%; width: 10%; height: 50%; background: linear-gradient(to right, #4e342e, #3e2723); border-radius: 5px; box-shadow: -5px 0 10px rgba(0,0,0,0.3); }
        .leaves-main { position: absolute; top: -10%; left: -30%; width: 160%; height: 80%; background: radial-gradient(circle, #ffc0cb, #ff69b4); border-radius: 50%; box-shadow: 0 10px 30px rgba(255,105,180,0.6); animation: sway 4s infinite ease-in-out alternate; }
        .leaves-sub { position: absolute; top: 10%; left: -50%; width: 120%; height: 60%; background: #ffb7c5; border-radius: 50%; animation: sway 3s infinite ease-in-out alternate-reverse; }
        .leaves-sub2 { position: absolute; top: 15%; right: -50%; width: 120%; height: 60%; background: #ffb7c5; border-radius: 50%; animation: sway 3.5s infinite ease-in-out alternate; }

        /* Layer 3: Foreground Field & Flowers (Moves Fastest for 3D effect) */
        #layer-front {
            position: absolute; bottom: -10%; width: 120%; left: -10%; height: 30%;
            background: linear-gradient(to top, #1b5e20, #4caf50);
            border-radius: 50% 50% 0 0 / 30px 30px 0 0;
            transition: transform 0.4s ease-out; transform-origin: center bottom; z-index: 3;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.2);
        }

        /* --- THE ACTORS --- */
        /* Fairy Sparkle Particle System */
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 15; }

        /* Intricate Butterfly */
        #butterfly-container {
            position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; z-index: 20; display: none; opacity: 0; transition: all 1s;
        }
        .butterfly-wing {
            position: absolute; top: 0; width: 35px; height: 60px;
            background: repeating-linear-gradient(45deg, #111, #111 5px, #fff 5px, #fff 10px);
            border: 2px solid #000; border-radius: 50% 50% 0 50%;
            transform-origin: right center; animation: flap 0.12s infinite alternate;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .wing-right { right: 0; border-radius: 50% 50% 50% 0; transform-origin: left center; animation: flap-right 0.12s infinite alternate; }

        .speech-bubble {
            position: absolute; top: -60px; left: -70px; background: rgba(255,255,255,0.95); color: #111;
            padding: 12px 18px; border-radius: 20px; font-size: 15px; font-weight: bold; font-family: sans-serif;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.5s; white-space: nowrap;
        }
        .speech-bubble::after { content: ''; position: absolute; bottom: -10px; left: 50%; border-width: 10px 10px 0; border-style: solid; border-color: rgba(255,255,255,0.95) transparent transparent transparent; transform: translateX(-50%); }

        /* The Purple Snowflake Box */
        #mystery-box {
            position: absolute; bottom: 38%; left: 50%; transform: translateX(-50%) scale(0);
            width: 70px; height: 60px; background: linear-gradient(135deg, #8e24aa, #4a148c);
            border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.3);
            z-index: 10; cursor: pointer; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #ce93d8;
        }
        .snowflake-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(white 1px, transparent 1px); background-size: 10px 10px; opacity: 0.3; }
        .crystal-knob { position: absolute; top: -12px; left: 30px; width: 12px; height: 12px; background: radial-gradient(circle, #ffffff, #81d4fa); border-radius: 50%; box-shadow: 0 0 15px #fff; }

        /* The Heart Cake */
        #cake-container {
            position: absolute; bottom: 35%; left: 50%; transform: translateX(-50%) scale(0);
            width: 100px; height: 120px; z-index: 11; transition: transform 1s ease; cursor: pointer;
        }
        .cake-base { position: absolute; bottom: 0; width: 100%; height: 50px; background: #FFF3E0; border-radius: 15px; border-bottom: 8px solid #E65100; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .cake-frosting { position: absolute; top: 60px; width: 100%; height: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .heart-topping { position: absolute; top: 40px; left: 40px; color: #d32f2f; font-size: 24px; animation: pulse 1s infinite; text-shadow: 0 5px 10px rgba(211,47,47,0.5); }
        .candle { position: absolute; bottom: 50px; left: 45px; width: 10px; height: 35px; background: repeating-linear-gradient(45deg, #fff, #fff 5px, #f48fb1 5px, #f48fb1 10px); border-radius: 3px; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        .flame { position: absolute; top: -20px; left: -2px; width: 14px; height: 22px; background: radial-gradient(ellipse at bottom, #fff 10%, #ffeb3b 40%, #ff9800 80%); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; box-shadow: 0 0 20px #ffeb3b, 0 0 40px #ff9800; animation: flicker 0.1s infinite alternate; }

        /* --- UI & SCREENS --- */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .start-btn { padding: 18px 40px; font-size: 20px; background: #e94560; color: white; border: none; border-radius: 30px; cursor: pointer; animation: pulse 2s infinite; box-shadow: 0 10px 20px rgba(233,69,96,0.4); }
        
        #instruction-panel {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            color: white; font-size: 16px; font-weight: bold; text-align: center;
            z-index: 30; display: none; width: 85%; background: rgba(0,0,0,0.7);
            padding: 15px; border-radius: 15px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2);
        }
        
        #walk-btn {
            position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%);
            padding: 12px 25px; background: white; color: #111; border: none; border-radius: 25px;
            font-weight: bold; display: none; z-index: 30; box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        #cinematic-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, transparent 20%, #0a0a0c 100%);
            opacity: 0; pointer-events: none; z-index: 40; transition: opacity 3s;
        }

        #final-text {
            position: absolute; top: 25%; left: 50%; transform: translateX(-50%); width: 90%;
            color: #FFD700; font-size: 28px; text-align: center; font-weight: bold;
            opacity: 0; transition: opacity 3s; z-index: 50; text-shadow: 0 0 20px #FFD700, 0 2px 5px rgba(0,0,0,0.8);
            display: none; line-height: 1.5;
        }

        /* Keyframes */
        @keyframes flap { from { transform: rotateY(15deg); } to { transform: rotateY(75deg); } }
        @keyframes flap-right { from { transform: rotateY(-15deg); } to { transform: rotateY(-75deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes flicker { 0% { transform: scale(1) rotate(-2deg); opacity: 0.8; } 100% { transform: scale(1.1) rotate(2deg); opacity: 1; } }
        @keyframes sway { 0% { transform: rotate(-3deg); } 100% { transform: rotate(3deg); } }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h2 style="text-shadow: 0 5px 15px rgba(0,0,0,0.5);">A Magical Journey Awaits</h2>
        <button class="start-btn" onclick="startGame()">Tap to Enter</button>
    </div>

    <div id="world">
        <div id="layer-sky"></div>
        
        <div id="layer-mid">
            <div class="grass-bg"></div>
            <div id="blossom-tree">
                <div class="trunk"></div>
                <div class="leaves-main"></div>
                <div class="leaves-sub"></div>
                <div class="leaves-sub2"></div>
            </div>
        </div>

        <div id="layer-front"></div>

        <div id="mystery-box" onclick="openBox()">
            <div class="snowflake-pattern"></div>
            <div class="crystal-knob"></div>
        </div>

        <div id="cake-container" onclick="triggerFinale()">
            <div class="flame" id="candle-flame"></div>
            <div class="candle"></div>
            <div class="cake-frosting"></div>
            <div class="heart-topping">❤️</div>
            <div class="cake-base"></div>
        </div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div id="butterfly-container">
        <div class="speech-bubble" id="bubble">hi! I am your friend.</div>
        <div class="butterfly-wing"></div>
        <div class="butterfly-wing wing-right"></div>
    </div>

    <div id="instruction-panel"></div>
    <button id="walk-btn" onclick="forceWalk()">Walk Forward 👣</button>
    
    <div id="cinematic-overlay"></div>
    
    <div id="final-text">
        Happy Birthday, Aditi!<br>
        <span style="font-size: 18px; color: white; text-shadow: none; font-weight: normal;">May your life be as magical as this journey.</span>
    </div>

    <script>
        // --- ASSETS ---
        const chimeAudio = new Audio('https://actions.google.com/sounds/v1/magic/magic_chime.ogg');
        const whooshAudio = new Audio('https://actions.google.com/sounds/v1/weather/wind_whoosh.ogg');
        const dingAudio = new Audio('https://actions.google.com/sounds/v1/cartoon/clank_and_squeak.ogg');
        const popAudio = new Audio('https://actions.google.com/sounds/v1/cartoon/pop.ogg');
        const hbdAudio = new Audio('https://cdn.pixabay.com/download/audio/2022/10/25/audio_517cf08fb1.mp3'); 
        
        let walkProgress = 0;
        let isAtTree = false;
        let audioContext, analyser, microphone;

        // --- FAIRY SPARKLE PARTICLE SYSTEM ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        function spawnSparkles(x, y) {
            for(let i=0; i<40; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10,
                    size: Math.random() * 4 + 2, life: 1, color: `hsl(${Math.random()*60 + 40}, 100%, 70%)`
                });
            }
            animateParticles();
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                if(p.life <= 0) particles.splice(index, 1);
            });
            if(particles.length > 0) requestAnimationFrame(animateParticles);
            else ctx.clearRect(0,0,canvas.width,canvas.height);
        }

        // --- STARTUP SEQUENCE ---
        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('world').style.display = 'block';
            
            chimeAudio.play().catch(e => console.log(e));
            
            // Spawn particles in center, then reveal butterfly
            setTimeout(() => {
                spawnSparkles(window.innerWidth/2, window.innerHeight * 0.8);
                
                setTimeout(() => {
                    const bfly = document.getElementById('butterfly-container');
                    bfly.style.display = 'block';
                    setTimeout(() => bfly.style.opacity = '1', 50);
                    startDialogue();
                }, 400);
            }, 800);
        }

        const dialogues = [
            "Hi! I am your friend.",
            "Come, we have to go to the tree.",
            "There is a treasure for you.",
            "Pinch your screen to zoom and walk!"
        ];
        
        function startDialogue() {
            const bubble = document.getElementById('bubble');
            bubble.style.opacity = '1';
            let i = 0;
            
            const chatInterval = setInterval(() => {
                i++;
                if(i < dialogues.length) {
                    bubble.innerText = dialogues[i];
                } else {
                    clearInterval(chatInterval);
                    document.getElementById('walk-btn').style.display = 'block';
                    enableZoomToWalk();
                }
            }, 3500);
        }

        // --- 3D PARALLAX WALKING LOGIC ---
        let initialDistance = 0;
        function enableZoomToWalk() {
            window.addEventListener('touchmove', (e) => {
                if(isAtTree) return;
                if(e.touches.length === 2) {
                    let dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    if(initialDistance === 0) initialDistance = dist;
                    if(dist > initialDistance + 15) { walkForward(); initialDistance = dist; }
                }
            });
        }

        function forceWalk() { walkForward(); walkForward(); }

        function walkForward() {
            if(isAtTree) return;
            walkProgress += 1;
            
            // FAKE 3D MATH: Layers move at different speeds!
            const midScale = 1 + (walkProgress * 0.15);
            const frontScale = 1 + (walkProgress * 0.3);
            const yOffset = walkProgress * 25;

            document.getElementById('layer-mid').style.transform = `scale(${midScale}) translateY(${yOffset}px)`;
            document.getElementById('layer-front').style.transform = `scale(${frontScale}) translateY(${yOffset * 1.5}px)`;
            
            if(walkProgress % 3 === 0) whooshAudio.play().catch(e=>{});

            if(walkProgress >= 7) reachTree();
        }

        function reachTree() {
            isAtTree = true;
            document.getElementById('walk-btn').style.display = 'none';
            document.getElementById('bubble').innerText = "Look! Open the box!";
            
            setTimeout(() => {
                dingAudio.play().catch(e=>{});
                document.getElementById('mystery-box').style.transform = `translateX(-50%) scale(1.2)`;
            }, 600);
        }

        function openBox() {
            popAudio.play().catch(e=>{});
            spawnSparkles(window.innerWidth/2, window.innerHeight * 0.6); // Magic burst
            
            document.getElementById('mystery-box').style.display = 'none';
            document.getElementById('cake-container').style.transform = `translateX(-50%) scale(1.3)`;
            document.getElementById('bubble').style.opacity = '0';
            
            const instText = document.getElementById('instruction-panel');
            instText.style.display = 'block';
            instText.innerText = "Connecting to magical microphone...";
            
            setupMicrophone();
        }

        // --- BULLETPROOF MIC DETECTION ---
        function setupMicrophone() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showMicFallback(); return;
            }

            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(function(stream) {
                document.getElementById('instruction-panel').innerHTML = "<b>Blow directly into your phone</b><br>to blow out the candle!";
                
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioContext.resume(); 
                
                analyser = audioContext.createAnalyser();
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                analyser.smoothingTimeConstant = 0.8; analyser.fftSize = 256;
                
                startBlowDetection();
            })
            .catch(function(err) { showMicFallback(); });
        }

        function showMicFallback() {
            document.getElementById('instruction-panel').innerHTML = "<b>Tap the cake</b> to blow out the candle! 🕯️";
        }

        function startBlowDetection() {
            if(!analyser) return; 
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function checkAudio() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let average = sum / dataArray.length;

                if (average > 65) { triggerFinale(); } 
                else { requestAnimationFrame(checkAudio); }
            }
            checkAudio();
        }

        // --- THE CINEMATIC FINALE ---
        let finaleTriggered = false;
        function triggerFinale() {
            if(finaleTriggered) return;
            finaleTriggered = true;

            // Blow out candle
            document.getElementById('candle-flame').style.display = 'none';
            document.getElementById('instruction-panel').style.display = 'none';
            document.getElementById('butterfly-container').style.display = 'none';
            
            // Epic Cinematic Transition
            document.body.style.backgroundColor = '#0a0a0c';
            document.getElementById('cinematic-overlay').style.opacity = '1'; 

            // Reveal and Celebrate
            setTimeout(() => {
                document.getElementById('layer-mid').style.opacity = '0.3'; // Darken world
                document.getElementById('layer-front').style.opacity = '0.3';
                
                document.getElementById('final-text').style.display = 'block';
                setTimeout(() => document.getElementById('final-text').style.opacity = '1', 100);
                
                hbdAudio.play().catch(e=>{});
                launchFireworks();
            }, 1500);
        }

        function launchFireworks() {
            var duration = 8 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 6, angle: 60, spread: 65, origin: { x: 0, y: 1 }, colors: ['#ff00ff', '#00ffff', '#FFD700', '#ffffff'], zIndex: 200 });
                confetti({ particleCount: 6, angle: 120, spread: 65, origin: { x: 1, y: 1 }, colors: ['#ff00ff', '#00ffff', '#FFD700', '#ffffff'], zIndex: 200 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
